name: Preview
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      # Delegate install-cli + cargo build + edge deploy + URL capture
      # to the reusable composite action. The composite declares
      # `preview-url` as an output, which the next step consumes via
      # `${{ steps.deploy.outputs.preview-url }}` (the `id: deploy`
      # here is the workflow's reference into the action's outputs,
      # not an internal step in the composite).
      #
      # Fork PRs do not receive `secrets.EDGECLOUD_API_KEY` — the
      # composite treats an empty API key as a no-op (writes empty
      # `preview-url`), and the `Comment PR` step's `if:` skips on
      # empty string. No secrets leak, no spurious failure.
      - uses: ./.github/actions/deploy-preview
        id: deploy
        with:
          api-key: ${{ secrets.EDGECLOUD_API_KEY }}
          api-url: ${{ secrets.EDGECLOUD_API_URL }}

      - name: Comment PR
        if: steps.deploy.outputs.preview-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed at: ${{ steps.deploy.outputs.preview-url }}`
            })
