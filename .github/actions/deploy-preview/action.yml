name: 'edgeCloud Deploy Preview'
description: 'Deploy a preview app to edgeCloud and expose the deployed URL as a step output. Optionally comments the URL on the originating PR.'
inputs:
  api-key:
    description: 'edgeCloud API key. Empty/omitted → no-op (writes empty `preview-url` output). Lets fork PRs use this action without secrets.'
    required: false
    default: ''
  api-url:
    description: 'edgeCloud API URL'
    required: false
    default: 'https://api.edgecloud.dev'
  build:
    description: 'Whether to run `cargo build --target wasm32-wasip2 --release` before deploying. Set to "false" if the caller has already built the wasm (e.g. via dtolnay/rust-toolchain).'
    required: false
    default: 'true'
  comment-on-pr:
    description: 'When "true", post a comment with the preview URL on the PR that triggered this run. Only meaningful on `pull_request` events.'
    required: false
    default: 'false'
outputs:
  preview-url:
    description: 'URL of the deployed preview. Empty when the API key is absent, the deploy fails, or the CLI does not emit a URL.'
    value: ${{ steps.deploy.outputs.preview-url }}
runs:
  using: 'composite'
  steps:
    - name: Install edge CLI
      shell: bash
      run: |
        curl -sSf https://raw.githubusercontent.com/edgeclouderz/edgecloud/main/scripts/install-cli.sh | bash

    - name: Build wasm
      if: inputs.build == 'true'
      shell: bash
      run: |
        rustup target add wasm32-wasip2
        cargo build --target wasm32-wasip2 --release

    - name: Deploy preview
      id: deploy
      shell: bash
      env:
        EDGE_API_KEY: ${{ inputs.api-key }}
        EDGE_API_URL: ${{ inputs.api-url }}
      run: |
        # Skip silently when no API key is configured (typical for
        # fork PRs where secrets aren't shared). The downstream
        # "Comment PR" step gates on `preview-url != ''` so this is a
        # no-op for the PR — and cheap (no cargo, no `edge deploy`).
        if [ -z "$EDGE_API_KEY" ]; then
          echo "no EDGE_API_KEY configured — skipping preview deploy"
          echo "preview-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # `set -o pipefail` ensures a failing `edge deploy --preview`
        # makes the step fail instead of masking the failure via
        # `tee`'s success exit code (the previous version used a
        # `... | tee` pipeline with no pipefail, so `grep` failing on
        # an empty output would have hidden a real CLI error).
        set -o pipefail

        # Capture merged stdout+stderr to a buffer so the URL parse
        # below can run against the full output regardless of where
        # the CLI wrote it.
        output=$(EDGE_API_KEY="$EDGE_API_KEY" EDGE_API_URL="$EDGE_API_URL" edge deploy --preview 2>&1) || {
          rc=$?
          echo "::error::edge deploy --preview failed (rc=$rc)"
          printf '%s\n' "$output"
          echo "preview-url=" >> "$GITHUB_OUTPUT"
          exit "$rc"
        }

        # The CLI emits the deployed URL on a line of its own as
        # "  URL: <url>" (see edge-cli/src/commands/deploy.rs:100).
        # Anchoring on the "  URL: " prefix avoids grabbing any
        # other https:// substring that the CLI or the API may have
        # printed — e.g. doc URLs in API 5xx bodies or GitHub PR
        # diff links in error templates. A naked "https?://..." grep
        # was incorrect (would pick the first doc/help URL on failure).
        url=$(printf '%s\n' "$output" | grep -E '^[[:space:]]*URL:[[:space:]]+https?://' | head -1 | grep -oP 'https?://\S+')
        # Fallback for the `--preview` deploy path, where the CLI
        # uses a suffixed `<tenant>-<app>--preview-<hash>.edgecloud.dev`
        # URL and may format it differently.
        [ -z "$url" ] && url=$(printf '%s\n' "$output" | grep -oP 'https://[A-Za-z0-9.-]*--preview-[A-Za-z0-9]+\.edgecloud\.dev' | head -1)
        [ -z "$url" ] && url=$(printf '%s\n' "$output" | grep -oP 'https://[A-Za-z0-9.-]+\.edgecloud\.dev' | head -1)

        echo "preview-url=$url" >> "$GITHUB_OUTPUT"
        if [ -n "$url" ]; then
          echo "preview-url=$url"
        fi

    - name: Comment PR
      if: inputs.comment-on-pr == 'true' && steps.deploy.outputs.preview-url != ''
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 Preview deployed at: ${{ steps.deploy.outputs.preview-url }}`
          })
